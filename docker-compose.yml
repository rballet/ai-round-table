# AI Round Table — run backend + frontend for local/testing
# From repo root: docker compose up --build
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to use the Docker volume path instead of the local default.
      - DATABASE_URL=sqlite+aiosqlite:///./data/ai_round_table.db
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_WS_URL=ws://localhost:8000
        - NEXT_PUBLIC_USE_MOCK=false
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
